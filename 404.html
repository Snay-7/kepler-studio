<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lost in space — Kleper.studio</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230A0A0B'/%3E%3Cellipse cx='16' cy='16' rx='12' ry='5' fill='none' stroke='white' stroke-width='1.4' transform='rotate(-20 16 16)'/%3E%3Ccircle cx='25' cy='10' r='4.5' fill='%2300FF88'/%3E%3Ccircle cx='16' cy='16' r='1.5' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0A0A0B; color: #fff;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 32px; line-height: 1.5; -webkit-font-smoothing: antialiased;
    overflow: hidden; position: relative;
  }
  body::before {
    content:""; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(0,255,136,.10) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,255,136,.08) 0%, transparent 40%);
  }
  .stars { position: absolute; inset: 0; opacity: .5; }
  .wrap { text-align: center; max-width: 640px; position: relative; }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px; border-radius: 999px;
    background: rgba(0,255,136,.08); border: 1px solid rgba(0,255,136,.25);
    font-size: 13px; font-weight: 600; color: #00FF88;
  }
  .badge .dot { width: 8px; height: 8px; background: #00FF88; border-radius: 50%; box-shadow: 0 0 0 4px rgba(0,255,136,.18); }
  h1 {
    font-size: clamp(72px, 16vw, 180px); font-weight: 800; letter-spacing: -6px;
    line-height: .9; margin-top: 24px;
  }
  h1 .accent {
    background: #00FF88; color: #0A0A0B;
    padding: 0 16px; border-radius: 18px;
    display: inline-block; transform: rotate(-2deg);
  }
  p { font-size: 18px; color: #9A9AA5; margin-top: 28px; max-width: 480px; margin-left: auto; margin-right: auto; }
  .ctas { margin-top: 40px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 10px; padding: 16px 26px; border-radius: 999px; font-weight: 700; font-size: 15px; text-decoration: none; }
  .btn-green { background: #00FF88; color: #0A0A0B; }
  .btn-ghost { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.2); }
  .brand { position: absolute; top: 32px; left: 32px; display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 22px; letter-spacing: -.5px; color: #fff; text-decoration: none; }
  .brand .mark { width: 32px; height: 32px; position: relative; }
  .brand .mark .ring { width: 100%; height: 100%; border: 1.5px solid rgba(255,255,255,.6); border-radius: 50%; transform: rotate(-20deg); }
  .brand .mark .planet { position: absolute; right: -2px; top: 2px; width: 10px; height: 10px; background: #00FF88; border-radius: 50%; }
  .brand .suffix { color: #00FF88; }
</style>
</head>
<body>
<a class="brand" href="/">
  <span class="mark"><span class="ring"></span><span class="planet"></span></span>
  <span>Kleper<span class="suffix">.studio</span></span>
</a>
<svg class="stars" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <g fill="#fff">
    <circle cx="120" cy="80" r="1" opacity=".4"/>
    <circle cx="280" cy="180" r="1.5" opacity=".5"/>
    <circle cx="640" cy="220" r="1" opacity=".4"/>
    <circle cx="820" cy="120" r="2" opacity=".55"/>
    <circle cx="1180" cy="200" r="1.5" opacity=".5"/>
    <circle cx="320" cy="480" r="1.5" opacity=".45"/>
    <circle cx="980" cy="420" r="2" opacity=".5"/>
    <circle cx="1380" cy="380" r="1.5" opacity=".45"/>
    <circle cx="180" cy="640" r="1" opacity=".4"/>
    <circle cx="700" cy="660" r="1" opacity=".35"/>
    <circle cx="1140" cy="640" r="2" opacity=".55"/>
  </g>
</svg>
<div class="wrap">
  <span class="badge"><span class="dot"></span>Lost in orbit</span>
  <h1><span class="accent">404</span></h1>
  <p>The page you're looking for has slipped past the gravitational pull of our website. Probably a stale link — let's get you back.</p>
  <div class="ctas">
    <a class="btn btn-green" href="/">Back to homepage →</a>
    <a class="btn btn-ghost" href="mailto:hello@kleper.studio">Email us</a>
  </div>
</div>
</body>
</html>
